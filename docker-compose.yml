services:
  job-copilot:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    privileged: true
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun
    volumes:
      - ./config:/app/config
      - ./resume:/app/resume
      - ./data:/app/data
      - ./wg0.conf:/etc/wireguard/wg0.conf:ro
