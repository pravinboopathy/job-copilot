gmail:
  credentials_path: "config/credentials.json"
  token_path: "config/token.json"
  query: "{from:jobs-noreply@linkedin.com from:jobalerts-noreply@linkedin.com from:jobs-listings@linkedin.com} newer_than:1d"
  max_results: 20

linkedin:
  # Shared body-shop / staffing-agency blocklist. Referenced via YAML anchors
  # below so we only edit one place when a new offender shows up. Not read
  # by the CLI directly (it iterates `search_queries`).
  body_shops: &body_shops
    - BeaconFire        # Java consultancy
    - Virtusa           # Java consultancy
    - Jobs via Dice     # aggregator
    - AgileGrid
    - Netrolynx
    - ConsultNet        # Windows-shop IT consultancy
    - TalentAlly        # recruiter
    - Engage Partners   # staffing
    - Pelham Berkeley   # recruiter
    - Kforce            # staffing
    - Stefanini         # consultancy
    - FetchJobs         # aggregator
    - Robert Half       # staffing
    - Pyramid Consulting
    - Hunter Bond       # recruiter
    - Shields Group     # recruiter ("Shields Group Search")

  # Shared seniority blocklist for all queries (you're 2 YOE, targeting entry/mid).
  seniority: &seniority
    - senior
    - sr           # "Sr." or "Sr Engineer"
    - staff
    - principal
    - lead
    - architect
    - manager
    - expert       # "Expert Site Reliability Engineer"
    - vp           # "Vice President" abbreviated in title

  search_queries:
    # Software — broad net; the 30% match gate is the final filter
    - keywords: "software engineer"
      location: "United States"
      time_filter: "r86400"
      filters:
        f_E: [2, 3]      # entry + associate
        f_WT: [2, 3]     # remote + hybrid
        f_JT: F          # full-time only
      title_exclude: *seniority
      company_exclude: *body_shops

    # Platform — matches the Kubernetes/Terraform/internal-tooling work
    - keywords: "platform engineer"
      location: "United States"
      time_filter: "r86400"
      filters:
        f_E: [2, 3]
        f_WT: [2, 3]
        f_JT: F
      title_exclude:
        - senior
        - sr
        - staff
        - principal
        - lead
        - architect
        - manager
        - expert
        - vp
        # Windows-shop noise that creeps in under "platform"
        - windows
        - active directory
        - entra
        - intune
      company_exclude: *body_shops

    # Backend — matches the Go microservices / gRPC / distributed storage work
    - keywords: "backend engineer"
      location: "United States"
      time_filter: "r86400"
      filters:
        f_E: [2, 3]
        f_WT: [2, 3]
        f_JT: F
      title_exclude:
        - java         # whole-word match; keeps "JavaScript", drops "Java Developer"
        - .NET
        - senior
        - sr
        - staff
        - principal
        - lead
        - architect
        - manager
        - expert
        - vp
      company_exclude: *body_shops
    # Filter-rich example (passed through to LinkedIn's guest API):
    # - keywords: "platform engineer"
    #   location: "United States"
    #   time_filter: "r86400"     # r86400=24h, r604800=7d, r2592000=30d
    #   max_results: 50            # default 25
    #   filters:
    #     f_WT: 2                  # workplace: 1=on-site 2=remote 3=hybrid
    #     f_E: [3, 4]              # experience: 3=associate 4=mid-senior
    #     f_JT: F                  # job type: F=FT P=PT C=contract T=temp
    #     # f_SB2, f_C, f_I, f_AL, geoId, distance, sortBy also accepted
  request_delay_seconds: 3

llm:
  provider: "anthropic"
  model: "claude-sonnet-4-20250514"
  max_tokens: 8192

resume:
  base_tex_path: "resume/base_resume.tex"

tailoring:
  strategy: "full"
  enable_keyword_extraction: true
  enable_ai_phrase_removal: true
  min_match_threshold: 20

output:
  directory: "data/output"
  filename_pattern: "{company}_{job_title}_{date}"

state:
  path: "data/processed_jobs.json"

notification:
  email: "boopathypravin@gmail.com"
